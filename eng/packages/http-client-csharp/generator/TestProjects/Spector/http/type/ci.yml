# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/type/ci.yml
    - sdk/type/Type.Array/
    - sdk/type/service.projects

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    SDKType: client
    ServiceDirectory: type
    ArtifactName: packages
    Artifacts:
    - name: Type.Array
      safeName: TypeArray