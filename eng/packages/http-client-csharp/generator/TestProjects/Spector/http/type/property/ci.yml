# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/property/ci.yml
    - sdk/property/Type.Property.AdditionalProperties/
    - sdk/property/service.projects

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    SDKType: client
    ServiceDirectory: property
    ArtifactName: packages
    Artifacts:
    - name: Type.Property.AdditionalProperties
      safeName: TypePropertyAdditionalProperties