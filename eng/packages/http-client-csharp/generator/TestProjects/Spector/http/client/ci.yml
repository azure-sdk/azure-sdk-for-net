# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/client/ci.yml
    - sdk/client/Client.ClientNamespace/
    - sdk/client/service.projects

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    SDKType: client
    ServiceDirectory: client
    ArtifactName: packages
    Artifacts:
    - name: Client.ClientNamespace
      safeName: ClientClientNamespace