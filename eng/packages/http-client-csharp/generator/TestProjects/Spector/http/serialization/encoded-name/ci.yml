# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/encoded-name/ci.yml
    - sdk/encoded-name/Serialization.EncodedName.Json/
    - sdk/encoded-name/service.projects

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    SDKType: client
    ServiceDirectory: encoded-name
    ArtifactName: packages
    Artifacts:
    - name: Serialization.EncodedName.Json
      safeName: SerializationEncodedNameJson