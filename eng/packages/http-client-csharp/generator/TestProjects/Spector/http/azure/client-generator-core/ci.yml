# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/client-generator-core/ci.yml
    - sdk/client-generator-core/_Specs_.Azure.ClientGenerator.Core.Access/
    - sdk/client-generator-core/service.projects

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    SDKType: client
    ServiceDirectory: client-generator-core
    ArtifactName: packages
    Artifacts:
    - name: _Specs_.Azure.ClientGenerator.Core.Access
      safeName: _Specs_AzureClientGeneratorCoreAccess