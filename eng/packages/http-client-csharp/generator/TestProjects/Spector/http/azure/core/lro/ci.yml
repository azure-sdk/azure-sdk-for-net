# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/lro/ci.yml
    - sdk/lro/_Specs_.Azure.Core.Lro.Rpc/
    - sdk/lro/service.projects

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    SDKType: client
    ServiceDirectory: lro
    ArtifactName: packages
    Artifacts:
    - name: _Specs_.Azure.Core.Lro.Rpc
      safeName: _Specs_AzureCoreLroRpc