# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/payload/ci.yml
    - sdk/payload/_Specs_.Azure.Payload.Pageable/
    - sdk/payload/service.projects

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    SDKType: client
    ServiceDirectory: payload
    ArtifactName: packages
    Artifacts:
    - name: _Specs_.Azure.Payload.Pageable
      safeName: _Specs_AzurePayloadPageable