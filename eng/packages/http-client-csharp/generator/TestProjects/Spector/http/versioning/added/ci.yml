# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/added/ci.yml
    - sdk/added/Versioning.Added.V1/
    - sdk/added/service.projects

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    SDKType: client
    ServiceDirectory: added
    ArtifactName: packages
    Artifacts:
    - name: Versioning.Added.V1
      safeName: VersioningAddedV1