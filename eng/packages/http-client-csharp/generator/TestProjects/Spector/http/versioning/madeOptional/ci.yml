# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/madeOptional/ci.yml
    - sdk/madeOptional/Versioning.MadeOptional.V1/
    - sdk/madeOptional/service.projects

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    SDKType: client
    ServiceDirectory: madeOptional
    ArtifactName: packages
    Artifacts:
    - name: Versioning.MadeOptional.V1
      safeName: VersioningMadeOptionalV1