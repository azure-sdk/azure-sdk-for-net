# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
  paths:
    include:
    - sdk/Local/ci.yml
    - sdk/Local/BasicTypeSpec/
    - sdk/Local/service.projects

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    SDKType: client
    ServiceDirectory: Local
    ArtifactName: packages
    Artifacts:
    - name: BasicTypeSpec
      safeName: BasicTypeSpec